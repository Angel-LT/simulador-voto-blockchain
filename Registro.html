<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Auditoría - Libro Mayor</title>
    <style>
        :root {
            --admin-dark: #0F172A;
            --accent-green: #4ADE80;
            --accent-blue: #38BDF8;
            --border-color: #334155;
            --text-light: #F8FAFC;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--admin-dark); color: var(--text-light); margin: 0; padding: 20px; }

        /* Acceso Restringido */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--admin-dark); z-index: 2000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .login-box { background: #1E293B; padding: 40px; border-radius: 12px; border: 1px solid var(--border-color); text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        input[type="password"] { padding: 12px; border-radius: 5px; border: 1px solid var(--border-color); background: #0F172A; color: white; width: 250px; margin-bottom: 20px; font-size: 16px; text-align: center; }
        .btn-access { background: var(--accent-green); color: #0F172A; border: none; padding: 12px 30px; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-access:hover { background: #22C55E; }

        /* Contenedor Principal */
        .container { max-width: 1200px; margin: 0 auto; display: none; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border-color); padding-bottom: 15px; margin-bottom: 30px; }
        h1 { color: var(--accent-green); letter-spacing: 1px; font-size: 24px; }

        /* Tabla de Registros */
        table { width: 100%; border-collapse: collapse; background: #1E293B; border-radius: 8px; overflow: hidden; }
        th { background: #334155; color: var(--accent-green); padding: 15px; text-align: left; font-size: 14px; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid var(--border-color); font-family: 'Courier New', monospace; font-size: 14px; }
        tr:hover { background: #1e2e4a; }

        /* Botones de Acción */
        .btn-nav { background: transparent; border: 1px solid var(--accent-green); color: var(--accent-green); padding: 8px 15px; border-radius: 5px; cursor: pointer; text-decoration: none; font-size: 14px; }
        .btn-nav:hover { background: var(--accent-green); color: var(--admin-dark); }
        .btn-export { background: var(--accent-blue); color: #0F172A; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-size: 14px; font-weight: bold; margin-left: 10px; transition: 0.3s;}
        .btn-export:hover { background: #0284C7; color: white; }

        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #1E293B; padding: 20px; border-radius: 8px; border-left: 4px solid var(--accent-green); }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2 style="margin-top: 0;">🛡️ Acceso Auditoría VMXN</h2>
            <input type="password" id="admin-pass" placeholder="TOKEN DE ACCESO">
            <br>
            <button class="btn-access" onclick="validarAcceso()">Entrar al Libro Mayor</button>
        </div>
    </div>

    <div class="container" id="admin-content">
        <header>
            <h1>📜 Libro Mayor Blockchain</h1>
            <div>
                <a href="VMXN.html" class="btn-nav">Regresar</a>
                <button class="btn-export" onclick="exportarCSV()">📥 Exportar a CSV</button>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <small style="color: #94A3B8; text-transform: uppercase;">Total Transacciones</small>
                <div id="stat-total" style="font-size: 24px; font-weight: bold; margin-top: 5px;">0</div>
            </div>
            <div class="stat-card" style="border-left-color: var(--accent-blue);">
                <small style="color: #94A3B8; text-transform: uppercase;">Estado de Red</small>
                <div style="font-size: 24px; font-weight: bold; color: var(--accent-blue); margin-top: 5px;">Auditoría Activa / Solo Lectura</div>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Hora</th>
                    <th>ID Usuario (Ofuscado)</th>
                    <th>Candidato</th>
                    <th>Hash de Auditoría</th>
                </tr>
            </thead>
            <tbody id="tabla-registros"></tbody>
        </table>
    </div>

    <script>
        const TOKEN_CORRECTO = "admin123";

        function configurarTeclado() {
            document.getElementById('admin-pass').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') validarAcceso();
            });
        }

        function validarAcceso() {
            if (document.getElementById('admin-pass').value === TOKEN_CORRECTO) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('admin-content').style.display = 'block';
                cargarVotos();
            } else {
                alert("Acceso Denegado: Token Inválido.");
            }
        }

        // Función Helper para procesar la fecha y hora almacenadas
        function extraerFechaYHora(fechaAlmacenada) {
            let fecha = "N/D";
            let hora = "N/D";

            if (fechaAlmacenada) {
                // El formato toLocaleString('es-MX') suele separar por coma: "DD/MM/YYYY, HH:MM:SS"
                const partes = fechaAlmacenada.split(',');
                if (partes.length >= 2) {
                    fecha = partes[0].trim();
                    hora = partes[1].trim();
                } else {
                    // Por si el formato regional no tiene coma, guardamos todo en fecha
                    fecha = fechaAlmacenada;
                }
            } else {
                // Fallback para votos viejos que no tenían la fecha guardada
                fecha = new Date().toLocaleDateString();
                hora = new Date().toLocaleTimeString();
            }

            return { fecha, hora };
        }

        function cargarVotos() {
            const tbody = document.getElementById('tabla-registros');
            let contador = 0;
            tbody.innerHTML = "";

            for (let i = 0; i < localStorage.length; i++) {
                const llave = localStorage.key(i);
                if (llave.startsWith("voto_")) {
                    contador++;
                    const data = JSON.parse(localStorage.getItem(llave));
                    const idOriginal = llave.replace("voto_", "");

                    // Extraer los datos procesados
                    const { fecha, hora } = extraerFechaYHora(data.fecha);

                    const fila = `
                        <tr>
                            <td>${fecha}</td>
                            <td>${hora}</td>
                            <td style="color: #94A3B8;">${idOriginal.substring(0,4)}...${idOriginal.slice(-2)}</td>
                            <td>${data.candidato}</td>
                            <td style="color: var(--accent-green); font-weight: bold;">${data.hash}</td>
                        </tr>
                    `;
                    tbody.innerHTML += fila;
                }
            }
            document.getElementById('stat-total').innerText = contador;
            if (contador === 0) tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding: 50px;">Sin registros en la red.</td></tr>';
        }

        function exportarCSV() {
            // Actualización de cabeceras: 5 columnas en total
            let csvContent = "Fecha de Registro,Hora de Registro,ID Usuario Original,Candidato Seleccionado,Hash de Auditoria\n";
            let registrosEncontrados = false;

            for (let i = 0; i < localStorage.length; i++) {
                const llave = localStorage.key(i);
                if (llave.startsWith("voto_")) {
                    registrosEncontrados = true;
                    const data = JSON.parse(localStorage.getItem(llave));
                    const idOriginal = llave.replace("voto_", "");

                    // Extraer los datos procesados para el CSV
                    const { fecha, hora } = extraerFechaYHora(data.fecha);

                    // Se formatea la fila respetando las 5 columnas
                    csvContent += `"${fecha}","${hora}","${idOriginal}","${data.candidato}","${data.hash}"\n`;
                }
            }

            if (!registrosEncontrados) {
                alert("No hay transacciones registradas para exportar.");
                return;
            }

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");

            link.setAttribute("href", url);
            link.setAttribute("download", "Libro_Mayor_Blockchain.csv");
            link.style.display = "none";

            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        window.onload = configurarTeclado;
    </script>
</body>
</html>
